<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Rewriter</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>
<h2>Email Rewriter ✉️</h2>

<textarea id="email" rows="10" placeholder="Paste your email here..."></textarea>

<br><br>

<select id="tone">
  <option value="professional">Professional</option>
  <option value="friendly">Friendly</option>
  <option value="direct">Direct</option>
  <option value="polite">Polite</option>
  <option value="passive-aggressive">Passive Aggressive</option>
</select>

<br><br>

<button onclick="rewrite()">Rewrite</button>

<h3>Result:</h3>
<pre id="result"></pre>
</body>
</html>
